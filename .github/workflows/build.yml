name: Build & Package

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin rdg-server --bin rdg-tui
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item target/release/rdg-server.exe dist/
          Copy-Item target/release/rdg-tui.exe dist/
          Copy-Item rdg-gateway.toml dist/
          Compress-Archive -Path dist/* -DestinationPath rdg-gateway-windows-x86_64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rdg-gateway-windows-x86_64
          path: rdg-gateway-windows-x86_64.zip

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --bin rdg-server --bin rdg-tui
      - name: Package
        run: |
          mkdir -p dist
          cp target/release/rdg-server dist/
          cp target/release/rdg-tui dist/
          strip dist/rdg-server dist/rdg-tui
          cp rdg-gateway.toml dist/
          cd dist && tar czf ../rdg-gateway-linux-x86_64.tar.gz *
      - uses: actions/upload-artifact@v4
        with:
          name: rdg-gateway-linux-x86_64
          path: rdg-gateway-linux-x86_64.tar.gz

  docker:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux, docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/rdg-gateway-windows-x86_64/rdg-gateway-windows-x86_64.zip
            artifacts/rdg-gateway-linux-x86_64/rdg-gateway-linux-x86_64.tar.gz
